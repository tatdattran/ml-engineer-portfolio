name: ml-portfolio

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip=24.0

  # Core data science
  - numpy=1.26
  - pandas=2.2
  - scipy=1.11
  - scikit-learn=1.4

  # Visualization
  - matplotlib=3.8
  - seaborn=0.13

  # Notebook
  - jupyterlab=4.1

  # Utilities
  - tqdm=4.66

  - pip:
      # Gradient boosting
      - xgboost==2.0.3
      - lightgbm==4.3.0

      # Deep learning
      - torch==2.2.2
      - torchvision==0.17.2

      # NLP
      - transformers==4.41.0
      - datasets==2.19.0
      - sentencepiece==0.2.0

      # Computer vision
      - ultralytics==8.2.0
      - opencv-python==4.9.0.80
      - pillow==10.3.0

      # API
      - fastapi==0.111.0
      - uvicorn==0.30.0

      # Experiment tracking
      - mlflow==2.13.0

      # Model persistence
      - joblib==1.4.2

      # Recommendation system
      - implicit==0.7.2
